# nginx proxy address - http://172.17.0.1:8107

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  lufi:
    image: lufi/lufi:latest
    container_name: lufi-app
    restart: unless-stopped
    logging: *default-logging
    networks:
      - lufi
    ports:
      - "8107:8107"
    environment:
      TZ: ${TZ:-America/New_York}
      PUID: ${SERVICE_USER:-1000}
      PGID: ${SERVICE_GROUP:-1000}
    volumes:
      - ./rootfs/config/lufi:/config
      - ./rootfs/data/lufi:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8107"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  lufi:
    external: false
